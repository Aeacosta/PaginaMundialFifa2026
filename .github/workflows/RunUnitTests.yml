name: .NET 10 Unit Tests

on:
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Project
      run: |
        cd backend/src/WorldCup2026.API
        dotnet restore --project WorldCup2026.API.csproj
        dotnet ef database update
        dotnet run

    - name: Run Tests
      run: dotnet test --no-restore --configuration Release --verbosity normal
