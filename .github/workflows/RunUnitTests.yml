name: .NET 10 Unit Tests

on:
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore backend/WorldCup2026.slnx

    - name: Build Solution
      run: dotnet build backend/WorldCup2026.slnx --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test backend/src/WorldCup2026.Tests/WorldCup2026.Tests.csproj --configuration Release --no-build --verbosity normal
